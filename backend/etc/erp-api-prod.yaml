Name: erp-api
Host: 0.0.0.0
Port: ${PORT}

Auth:
  AccessSecret: ${JWT_SECRET}
  AccessExpire: 86400  # 24h

DB:
  # Neon/Supabase yêu cầu sslmode=require, ví dụ:
  # postgres://user:pass@host/db?sslmode=require
  DataSource: ${DATABASE_URL}

# (Các) domain Front-end được phép gọi API, phân tách bằng dấu phẩy.
# ví dụ: https://moca-erp.vercel.app,https://erp.mocatech.vn
CorsOrigin: ${FRONTEND_ORIGIN}

Log:
  Level: error
  Mode: console
